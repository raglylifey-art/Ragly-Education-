<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --sky-blue: #71c5ee;
            --toy-yellow: #f9d423;
            --buzz-purple: #6a3093;
            --woody-red: #e74c3c;
            --rex-green: #2ecc71;
            --alien-teal: #00b4db;
            --bubbly-font: 'Cherry Bomb One', cursive;
        }

        /* ANIMATED CLOUD BACKGROUND */
        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--sky-blue);
            background-image: url('https://www.transparenttextures.com/patterns/clouds.png');
            animation: moveClouds 60s linear infinite;
            color: #333;
            overflow-x: hidden;
        }

        @keyframes moveClouds {
            from { background-position: 0 0; }
            to { background-position: 1000px 0; }
        }

        /* BOUNCY NAVIGATION */
        nav {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 15px;
            border-bottom: 6px solid var(--toy-yellow);
        }

        nav a {
            text-decoration: none;
            color: white;
            font-family: var(--bubbly-font);
            padding: 12px 25px;
            border-radius: 50px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0px rgba(0,0,0,0.2);
        }

        .nav-1 { background: var(--buzz-purple); }
        .nav-2 { background: var(--woody-red); }
        .nav-3 { background: var(--rex-green); }

        nav a:hover { transform: scale(1.1) rotate(3deg); }

        /* HERO HEADER */
        header {
            background: white;
            padding: 80px 20px;
            text-align: center;
            border-bottom: 12px solid var(--woody-red);
            border-radius: 0 0 50% 50% / 0 0 15% 15%;
        }

        .hero-title {
            font-family: var(--bubbly-font);
            font-size: 4rem;
            color: var(--buzz-purple);
            margin: 0;
            text-shadow: 5px 5px 0px var(--toy-yellow);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .container {
            max-width: 1000px;

            padding: 60px 30px;

            border: 10px solid var(--toy-yellow);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
